{% extends "base.html" %}
{% block content %}
<div style="display: flex; align-items: center; justify-content: center; min-height: 75vh;">
    <div class="card-box" style="width: 100%; max-width: 400px; padding: 32px;">
        <div style="text-align: center; margin-bottom: 24px;">
            <h2 id="form-title" style="margin-bottom: 4px;">Acessar Sistema</h2>
            <p id="form-subtitle" style="font-size: 13px; color: var(--text-dim);">Entre com suas credenciais da Ecolyzer</p>
        </div>

        <div id="alert-box" class="status-badge pendente" style="display: none; width: 100%; text-align: center; margin-bottom: 16px; padding: 10px; border-radius: 6px;"></div>

        <form id="auth-form">
            <div id="group-name" style="display: none; margin-bottom: 14px;">
                <label>Nome Completo</label>
                <input type="text" id="auth-name" class="form-control" placeholder="Seu nome completo">
            </div>

            <div style="margin-bottom: 14px;">
                <label id="label-email">E-mail ou Identificador</label>
                <input type="text" id="auth-email" class="form-control" required placeholder="admin ou email@empresa.com">
            </div>

            <div style="margin-bottom: 20px;">
                <label>Senha de Acesso</label>
                <input type="password" id="auth-password" class="form-control" required placeholder="••••••••">
            </div>

            <button type="submit" id="btn-submit" class="btn btn-primary" style="width: 100%; justify-content: center; height: 42px;">
                Entrar no Sistema
            </button>
        </form>

        <div style="text-align: center; margin-top: 20px; font-size: 13px;">
            <span id="switch-text" style="color: var(--text-dim);">Não possui uma conta?</span>
            <a href="#" id="btn-switch" style="color: var(--primary); font-weight: 600; text-decoration: none; margin-left: 4px;">Cadastre-se</a>
        </div>
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {
    let isLoginState = true;

    const form = document.getElementById("auth-form");
    const formTitle = document.getElementById("form-title");
    const formSubtitle = document.getElementById("form-subtitle");
    const groupName = document.getElementById("group-name");
    const labelEmail = document.getElementById("label-email");
    const inputEmail = document.getElementById("auth-email");
    const btnSubmit = document.getElementById("btn-submit");
    const btnSwitch = document.getElementById("btn-switch");
    const switchText = document.getElementById("switch-text");
    const alertBox = document.getElementById("alert-box");

    btnSwitch.addEventListener("click", function(e) {
        e.preventDefault();
        isLoginState = !isLoginState;
        alertBox.style.display = "none";
        form.reset();

        if (isLoginState) {
            formTitle.innerText = "Acessar Sistema";
            formSubtitle.innerText = "Entre com suas credenciais do Ecolyzer";
            groupName.style.display = "none";
            document.getElementById("auth-name").removeAttribute("required");
            labelEmail.innerText = "E-mail ou Identificador";
            inputEmail.placeholder = "admin ou email@empresa.com";
            btnSubmit.innerText = "Entrar no Sistema";
            switchText.innerText = "Não possui uma conta?";
            btnSwitch.innerText = "Cadastre-se";
        } else {
            formTitle.innerText = "Criar Nova Conta";
            formSubtitle.innerText = "Cadastre seu usuário gestor na plataforma";
            groupName.style.display = "block";
            document.getElementById("auth-name").setAttribute("required", "required");
            labelEmail.innerText = "Endereço de E-mail";
            inputEmail.placeholder = "nome@empresa.com";
            btnSubmit.innerText = "Concluir Cadastro";
            switchText.innerText = "Já possui uma conta?";
            btnSwitch.innerText = "Fazer Login";
        }
    });


    form.addEventListener("submit", async function(e) {
        e.preventDefault();
        alertBox.style.display = "none";

        const payload = {
            email: inputEmail.value.trim(),
            password: document.getElementById("auth-password").value
        };

        let endpoint = "/api/login";

        if (!isLoginState) {
            endpoint = "/api/register";
            payload.name = document.getElementById("auth-name").value.trim();
        }

        try {
            const response = await fetch(endpoint, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });

            const result = await response.get_json ? await response.get_json() : await response.json();

            if (response.ok) {
                if (isLoginState) {
                    // Login efetuado com sucesso -> Redireciona para o Dashboard
                    window.location.href = result.redirect_url || "/";
                } else {
                    // Registro efetuado -> Exibe sucesso e altera estado para login
                    alertBox.className = "status-badge valido";
                    alertBox.innerText = "Cadastro realizado! Faça login.";
                    alertBox.style.display = "block";
                    btnSwitch.click(); // Volta automaticamente para tela de login
                }
            } else {
                alertBox.className = "status-badge pendente";
                alertBox.innerText = result.error || "Falha na operação de autenticação.";
                alertBox.style.display = "block";
            }
        } catch (err) {
            console.error(err);
            alertBox.className = "status-badge pendente";
            alertBox.innerText = "Erro de comunicação com o servidor.";
            alertBox.style.display = "block";
        }
    });
});
</script>
{% endblock %}
