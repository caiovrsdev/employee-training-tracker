{% extends "base.html" %}
{% block content %}
<div class="topbar">
  <h1>{{ 'Editar Treinamento' if t else 'Novo Treinamento' }}</h1>
  <a href="/treinamentos" class="btn">Voltar para Lista</a>
</div>

<div class="card-box" style="max-width: 800px; margin: 0 auto;">
  <form method="POST">
    
    <label>Código / Nome do Treinamento</label>
    <input type="text" name="codigo" class="form-control" value="{{ t.codigo if t else '' }}" required placeholder="Ex: POP-TX 01.02 - Circulação no Biotério">
    
    <label>Departamentos Aplicáveis (Separados por vírgula)</label>
    <input type="text" name="departamentos" class="form-control" style="margin-bottom: 4px;" value="{{ t.departamentos if t else '' }}" required placeholder="Ex: GQ, GL, ADM">
    <small style="color: var(--text-dim); font-size: 11px; display: block; margin-bottom: 14px;">Escreva as siglas exatas dos setores separadas por vírgula.</small>

    <div class="grid-2" style="margin-bottom: 0;">
      <div>
        <label>Sigla do Documento (Obrigatório)</label>
        <input type="text" name="sigla_doc" class="form-control" value="{{ t.sigla_doc if t else '' }}" placeholder="Ex: TRI307/2025">
      </div>
      <div>
        <label>Data de Aprovação (Obrigatório)</label>
        <input type="date" name="data_aprovacao" class="form-control" value="{{ t.data_aprovacao if t else '' }}">
      </div>
    </div>

    <label>Observações</label>
    <textarea name="obs" class="form-control" rows="4" style="resize: vertical;" placeholder="Alguma observação relevante sobre a revisão ou conteúdo...">{{ t.obs if t else '' }}</textarea>

    <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">
      {{ 'Salvar Alterações' if t else 'Cadastrar Treinamento' }}
    </button>
  </form>
</div>
{% endblock %}
