<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle de Treinamentos</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3248;
    --accent: #4f8ef7;
    --green: #22c55e;
    --red: #ef4444;
    --text: #e2e8f0;
    --text-dim: #94a3b8;
    --radius: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }

  /* HEADER / NAV */
  nav { 
    background: var(--surface); 
    border-bottom: 1px solid var(--border); 
    padding: 0 24px; 
    display: flex; 
    align-items: center; 
    height: 56px; 
    position: sticky; 
    top: 0; 
    z-index: 1000; 
    gap: 16px;
  }
  .nav-brand { font-weight: 700; font-size: 14px; color: var(--accent); white-space: nowrap; }
  .nav-brand span { color: var(--text-dim); font-weight: 400; }
  
  .nav-links { display: flex; align-items: center; gap: 4px; }
  nav a { color: var(--text-dim); text-decoration: none; font-size: 13px; padding: 6px 12px; border-radius: 6px; transition: all .15s; white-space: nowrap; }
  nav a:hover, nav a.active { background: var(--surface2); color: var(--text); }
  
  .nav-sep { width: 1px; height: 20px; background: var(--border); flex-shrink: 0; }
  
  .nav-setores { display: flex; gap: 4px; align-items: center; overflow-x: auto; max-width: 400px; }
  .nav-setores::-webkit-scrollbar { height: 0; display: none; }
  .nav-setores a { font-weight: 600; color: var(--accent); }

  /* SEARCH */
  .nav-search-container { position: relative; width: 240px; margin-left: auto; flex-shrink: 0; }
  .nav-search-input { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 6px 12px; font-size: 13px; outline: none; transition: border .15s; }
  .nav-search-input:focus { border-color: var(--accent); }
  
  .nav-search-results { position: absolute; top: 120%; left: 0; width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; box-shadow: 0 8px 16px rgba(0,0,0,0.5); display: none; z-index: 9999; max-height: 250px; overflow-y: auto; }
  .search-item { padding: 10px 12px; cursor: pointer; border-bottom: 1px solid var(--border); font-size: 13px; color: var(--text); display: flex; justify-content: space-between; align-items: center; }
  .search-item:hover { background: var(--surface2); }
  .search-item span { font-size: 10px; background: var(--surface2); color: var(--accent); padding: 2px 6px; border-radius: 4px; font-weight: bold; }

  .nav-auth { display: flex; align-items: center; gap: 10px; font-size: 12px; white-space: nowrap; flex-shrink: 0; }
  .nav-auth span { color: var(--text-dim); }
  .nav-auth a { padding: 6px 12px; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; font-weight: 600; text-decoration: none; color: var(--text); }
  .nav-auth a.logout-btn { color: var(--red); border-color: rgba(239, 68, 68, 0.2); }

  /* COMPONENTES PADRONIZADOS */
  main { max-width: 1400px; margin: 0 auto; padding: 24px; }
  .topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; gap: 12px; }
  h1 { font-size: 22px; font-weight: 700; color: var(--text); }
  h3 { font-size: 15px; font-weight: 600; margin-bottom: 16px; color: var(--text); }
  
  .card-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 20px; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
  
  /* PADRÃO DE BOTÕES E INPUTS */
  .form-control {
    width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text);
    border-radius: 6px; padding: 9px 12px; font-size: 13px; outline: none; transition: border-color .15s; margin-bottom: 14px;
  }
  .form-control:focus { border-color: var(--accent); }
  label { display: block; font-size: 11px; color: var(--text-dim); margin-bottom: 5px; text-transform: uppercase; font-weight: 600; }
  
  .btn {
    background: var(--surface2); color: var(--text); border: 1px solid var(--border); padding: 8px 16px;
    border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all .15s; text-decoration: none; display: inline-flex; align-items: center; justify-content: center;
  }
  .btn:hover { background: var(--border); }
  .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-primary:hover { opacity: 0.9; }
  .btn-danger { background: rgba(239, 68, 68, 0.1); color: var(--red); border-color: rgba(239, 68, 68, 0.2); }
  .btn-danger:hover { background: var(--red); color: #fff; }
  .btn-sm { padding: 4px 10px; font-size: 12px; }
  .btn-success { background: var(--green); color: #fff; border-color: var(--green); }

  /* TABELAS */
  .table-wrap { overflow-x: auto; border-radius: var(--radius); border: 1px solid var(--border); background: var(--surface); }
  table { width: 100%; border-collapse: collapse; font-size: 13px; text-align: left; }
  th { background: var(--surface2); color: var(--text-dim); font-weight: 600; font-size: 11px; text-transform: uppercase; padding: 12px 16px; border-bottom: 1px solid var(--border); }
  td { padding: 12px 16px; border-bottom: 1px solid var(--border); color: var(--text); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,0.01); }

  /* RETÂNGULO DICA */
  .tip-box { background: rgba(79, 142, 247, 0.1); border: 1px solid rgba(79, 142, 247, 0.2); border-radius: 6px; padding: 10px 14px; font-size: 12px; color: var(--accent); margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }

  /* DASHBOARD CARDS */
  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .d-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; }
  .d-num { font-size: 36px; font-weight: 800; line-height: 1; }
  .d-label { font-size: 11px; color: var(--text-dim); margin-top: 8px; text-transform: uppercase; font-weight: 600; }
  .d-card.white .d-num { color: var(--text); }
  .d-card.green .d-num { color: var(--green); }
  .d-card.red .d-num { color: var(--red); }
  
  .chip { background: var(--surface2); color: var(--accent); font-weight: 600; border: 1px solid var(--border); padding: 2px 6px; border-radius: 4px; font-size: 11px; }
  .alert { padding: 10px 14px; border-radius: 6px; font-size: 13px; margin-bottom: 16px; border: 1px solid rgba(255,255,255,0.1); }
  .alert-info { background: rgba(79, 142, 247, 0.1); color: var(--accent); }
</style>
</head>
<body>
<nav>
  <div class="nav-brand">Controle de Treinamentos <span>Ecolyzer</span></div>
  <div class="nav-links">
    <a href="/" {% if request.endpoint=='index' %}class="active"{% endif %}>Dashboard</a>
    <a href="/treinamentos" {% if request.endpoint in ['treinamentos','novo_treinamento','editar_treinamento'] %}class="active"{% endif %}>Lista Doc</a>
    <a href="/colaboradores" {% if request.endpoint=='colaboradores' %}class="active"{% endif %}>Colaboradores</a>
  </div>
  <div class="nav-sep"></div>
  <div class="nav-setores">
    {% for s in all_setores %}
    <a href="/setor/{{ s.sigla }}" {% if request.endpoint=='setor' and setor is defined and setor.sigla==s.sigla %}class="active"{% endif %}>{{ s.sigla }}</a>
    {% endfor %}
  </div>
  <div class="nav-search-container">
    <input type="text" id="nav-search" class="nav-search-input" placeholder="Buscar colaborador...">
    <div id="nav-search-results" class="nav-search-results"></div>
  </div>
  <div class="nav-auth">
    {% if current_user.is_authenticated %}
      <span>{{ current_user.nome }}</span>
      <a href="/logout" class="logout-btn">Sair</a>
    {% else %}
      <a href="/login">Entrar</a>
    {% endif %}
  </div>
</nav>
<main>
  {% block content %}{% endblock %}
</main>
<script>
document.getElementById('nav-search').addEventListener('input', function(e) {
    let q = e.target.value.trim();
    let resultsDiv = document.getElementById('nav-search-results');
    if (q.length < 2) { resultsDiv.innerHTML = ''; resultsDiv.style.display = 'none'; return; }
    fetch(`/api/buscar-colaborador?q=${encodeURIComponent(q)}`)
        .then(res => res.json())
        .then(data => {
            resultsDiv.innerHTML = '';
            if (data.length === 0) {
                resultsDiv.innerHTML = '<div style="padding:10px;color:var(--text-dim);font-size:12px;text-align:center;">Nenhum colaborador encontrado</div>';
                resultsDiv.style.display = 'block';
                return;
            }
            data.forEach(colab => {
                let item = document.createElement('div');
                item.className = 'search-item';
                item.innerHTML = `<div><strong>${colab.nome}</strong></div> <span>${colab.sigla}</span>`;
                item.addEventListener('click', function() { window.location.href = `/setor/${colab.sigla}?colab=${colab.id}`; });
                resultsDiv.appendChild(item);
            });
            resultsDiv.style.display = 'block';
        });
});
document.addEventListener('click', function(e) { if (e.target.id !== 'nav-search') { document.getElementById('nav-search-results').style.display = 'none'; } });
</script>
</body>
</html>
