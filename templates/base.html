<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Ecolyzer - Treinamentos</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');
        :root {
            /* LIGHT MODE (Padrão) */
            --bg: #f8fafc;
            --surface: #ffffff;
            --text: #0f172a;
            --text-dim: #64748b;
            --border: #e2e8f0;
            --primary: #2563eb;
            --green: #166534;
            --red: #991b1b;
        }
        body.dark-mode {
            /* DARK MODE OVERRIDE */
            --bg: #0f172a;
            --surface: #1e293b;
            --text: #f8fafc;
            --text-dim: #cbd5e1;
            --border: #334155;
            --primary: #3b82f6;
            --green: #22c55e;
            --red: #ef4444;
        }

        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; transition: background 0.3s, color 0.3s; }
        .nav { background: var(--surface); padding: 16px 32px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .nav-links { display: flex; gap: 20px; align-items: center; }
        .nav a { color: var(--text); text-decoration: none; font-weight: 500; }
        .container { padding: 32px; max-width: 1400px; margin: 0 auto; }
        .card-box { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; }
        
        .btn { padding: 8px 16px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); color: var(--text); cursor: pointer; text-decoration: none; }
        .btn-primary { background: var(--primary); color: white; border: none; }
        .form-control { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--text); margin-bottom: 16px; box-sizing: border-box;}
        
        table { width: 100%; border-collapse: collapse; background: var(--surface); }
        th, td { padding: 12px; border-bottom: 1px solid var(--border); text-align: left; }
        th { font-weight: 600; color: var(--text-dim); }
        
        .status-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 600; }
        .status-badge.valido { background-color: var(--green) !important; color: white !important; }
        .status-badge.pendente { background-color: var(--red) !important; color: white !important; }
        .status-badge.vazio { background-color: var(--text-dim) !important; color: white !important; }
        
        #theme-toggle { background: transparent; border: 1px solid var(--border); color: var(--text); padding: 8px; border-radius: 50%; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>
    <div class="nav">
        <div style="font-weight: 700; font-size: 20px; color: var(--primary);">Ecolyzer</div>
        <div class="nav-links">
            <a href="/">Dashboard</a>
            <a href="/colaboradores">Colaboradores</a>
            <button id="theme-toggle">🌓</button>
            <a href="/logout" style="color: var(--red);">Sair</a>
        </div>
    </div>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <div id="globalRegistroModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 9999; align-items: center; justify-content: center; backdrop-filter: blur(4px);">
        <div class="card-box" style="width: 360px; max-width: 90%;">
            <h3 style="margin-top: 0;">Atualizar Treinamento</h3>
            <form id="globalRegistroForm">
                <input type="hidden" id="modalColabId" name="colab_id">
                <input type="hidden" id="modalTreinoId" name="treino_id">
                
                <label>Data de Realização</label>
                <input type="date" id="modalDataRealizacao" name="data_realizacao" class="form-control" required>
                
                <div style="display: flex; gap: 8px; margin-bottom: 12px; align-items: center;">
                    <input type="checkbox" id="modalNA" name="na" value="1">
                    <label for="modalNA" style="margin:0;">Não Aplicável (N/A)</label>
                </div>

                <div style="display: flex; gap: 8px; margin-bottom: 24px; align-items: center; padding-top: 12px; border-top: 1px solid var(--border);">
                    <input type="checkbox" id="modalAtualizar" name="atualizar" value="1">
                    <label for="modalAtualizar" style="margin:0; font-weight: 600; color: var(--red);">Atualizar (Forçar Refação)</label>
                </div>
                
                <div style="display: flex; gap: 8px;">
                    <button type="button" class="btn" style="flex: 1;" onclick="document.getElementById('globalRegistroModal').style.display='none'">Cancelar</button>
                    <button type="submit" class="btn btn-primary" style="flex: 1;">Salvar Registro</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // ── LÓGICA DO DARK MODE ──
        const toggleBtn = document.getElementById('theme-toggle');
        if(localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-mode');
        
        toggleBtn.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
        });

        // ── LÓGICA DO MODAL GLOBAL ──
        const gModal = document.getElementById('globalRegistroModal');
        const gForm = document.getElementById('globalRegistroForm');
        const iData = document.getElementById('modalDataRealizacao');
        const chkNA = document.getElementById('modalNA');
        const chkAtualizar = document.getElementById('modalAtualizar');

        // Travar inputs se "Forçar Refação" for clicado
        chkAtualizar.addEventListener('change', (e) => {
            if(e.target.checked){
                iData.disabled = true; chkNA.disabled = true; chkNA.checked = false;
                iData.removeAttribute('required');
            } else {
                iData.disabled = false; chkNA.disabled = false;
                if(!chkNA.checked) iData.setAttribute('required', 'required');
            }
        });

        chkNA.addEventListener('change', (e) => {
            if(e.target.checked){ iData.disabled = true; iData.removeAttribute('required'); }
            else { iData.disabled = false; iData.setAttribute('required', 'required'); }
        });

        // Escuta os cliques nas células da matriz
        document.addEventListener("click", function(e) {
            const cell = e.target.closest('.matrix-cell');
            if(cell) {
                document.getElementById('modalColabId').value = cell.dataset.colabId;
                document.getElementById('modalTreinoId').value = cell.dataset.treinoId;
                iData.value = cell.dataset.currentDate || '';
                chkNA.checked = cell.dataset.currentNa === '1';
                chkAtualizar.checked = false; // Reset
                chkAtualizar.dispatchEvent(new Event('change')); // Trigger states
                chkNA.dispatchEvent(new Event('change'));
                gModal.style.display = 'flex';
            }
        });

        gForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const params = new URLSearchParams(new FormData(gForm));
            try {
                const res = await fetch('/registro/salvar', { method: 'POST', body: params });
                if(res.ok) window.location.reload();
                else alert('Erro ao salvar registro.');
            } catch(e) { alert('Falha de conexão.'); }
        });
    </script>
</body>
</html>
