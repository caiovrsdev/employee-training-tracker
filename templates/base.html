<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle de Treinamentos</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3248;
    --accent: #4f8ef7;
    --accent2: #6c63ff;
    --green: #22c55e;
    --red: #ef4444;
    --yellow: #f59e0b;
    --gray: #64748b;
    --text: #e2e8f0;
    --text-dim: #94a3b8;
    --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }

  /* NAV */
  nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; display: flex; align-items: center; gap: 8px; height: 56px; position: sticky; top: 0; z-index: 100; }
  .nav-brand { font-weight: 700; font-size: 15px; color: var(--accent); margin-right: 16px; white-space: nowrap; }
  .nav-brand span { color: var(--text-dim); font-weight: 400; }
  nav a { color: var(--text-dim); text-decoration: none; font-size: 13px; padding: 6px 12px; border-radius: 6px; transition: all .15s; white-space: nowrap; }
  nav a:hover, nav a.active { background: var(--surface2); color: var(--text); }
  .nav-sep { width: 1px; height: 20px; background: var(--border); margin: 0 4px; }
  .nav-setores { display: flex; gap: 4px; flex-wrap: nowrap; overflow-x: auto; }
  .nav-setores::-webkit-scrollbar { height: 0; }

  /* LAYOUT */
  main { max-width: 1400px; margin: 0 auto; padding: 28px 24px; }
  h1 { font-size: 22px; font-weight: 700; margin-bottom: 20px; }
  h2 { font-size: 16px; font-weight: 600; margin-bottom: 14px; color: var(--text-dim); }

  /* CARDS DASHBOARD */
  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px,1fr)); gap: 16px; margin-bottom: 32px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
  .card-num { font-size: 36px; font-weight: 800; line-height: 1; }
  .card-label { font-size: 12px; color: var(--text-dim); margin-top: 6px; text-transform: uppercase; letter-spacing: .05em; }
  .card.green .card-num { color: var(--green); }
  .card.red .card-num { color: var(--red); }
  .card.blue .card-num { color: var(--accent); }
  .card.gray .card-num { color: var(--gray); }

  /* TABLE */
  .table-wrap { overflow-x: auto; border-radius: var(--radius); border: 1px solid var(--border); }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th { background: var(--surface2); color: var(--text-dim); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: .06em; padding: 10px 14px; text-align: left; border-bottom: 1px solid var(--border); white-space: nowrap; }
  tbody tr { border-bottom: 1px solid var(--border); transition: background .1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--surface2); }
  td { padding: 10px 14px; vertical-align: middle; }
  td.center { text-align: center; }

  /* STATUS BADGES */
  .badge { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .badge-green { background: #14532d55; color: var(--green); border: 1px solid #22c55e44; }
  .badge-red   { background: #7f1d1d55; color: var(--red);   border: 1px solid #ef444444; }
  .badge-gray  { background: #1e293b; color: var(--gray);    border: 1px solid var(--border); }
  .badge-yellow{ background: #78350f55; color: var(--yellow); border: 1px solid #f59e0b44; }

  /* FORMS */
  .form-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; max-width: 620px; }
  .form-row { margin-bottom: 16px; }
  label { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 6px; font-weight: 500; }
  input[type=text], input[type=date], textarea, select {
    width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text);
    border-radius: 6px; padding: 8px 12px; font-size: 14px; outline: none; transition: border .15s;
  }
  input:focus, textarea:focus, select:focus { border-color: var(--accent); }
  textarea { resize: vertical; min-height: 70px; }

  /* BUTTONS */
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; text-decoration: none; transition: all .15s; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #3a7ae0; }
  .btn-outline { background: transparent; color: var(--text-dim); border: 1px solid var(--border); }
  .btn-outline:hover { background: var(--surface2); color: var(--text); }
  .btn-danger { background: #7f1d1d55; color: var(--red); border: 1px solid #ef444444; }
  .btn-danger:hover { background: #ef44441a; }
  .btn-sm { padding: 4px 10px; font-size: 12px; }
  .btn-green { background: #14532d; color: var(--green); border: 1px solid #22c55e44; }
  .btn-green:hover { background: #166534; }

  /* TOP BAR */
  .topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }

  /* SETOR TABLE */
  .setor-table-wrap { overflow-x: auto; }
  .setor-table { border-collapse: collapse; font-size: 12px; min-width: 600px; }
  .setor-table th { background: var(--surface2); color: var(--text-dim); padding: 8px 10px; border: 1px solid var(--border); font-size: 11px; text-transform: uppercase; letter-spacing: .04em; white-space: nowrap; }
  .setor-table td { border: 1px solid var(--border); padding: 6px 10px; vertical-align: middle; }
  .setor-table tr:hover td { background: #ffffff08; }
  .col-treino { min-width: 220px; }
  .col-data { width: 130px; }
  .col-status { width: 100px; text-align: center; }
  input.date-input { background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 4px; padding: 4px 6px; font-size: 12px; width: 120px; }
  input.date-input:focus { border-color: var(--accent); outline: none; }
  .na-check { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-dim); cursor: pointer; }
  .na-check input { width: auto; cursor: pointer; }
  .save-btn { background: var(--accent); color: #fff; border: none; border-radius: 4px; padding: 4px 10px; font-size: 11px; font-weight: 600; cursor: pointer; }
  .save-btn:hover { background: #3a7ae0; }
  .saved-flash { font-size: 11px; color: var(--green); margin-left: 4px; display: none; }

  /* ALERT */
  .alert { padding: 10px 16px; border-radius: 6px; font-size: 13px; margin-bottom: 16px; }
  .alert-info { background: #1e3a5f; border: 1px solid #4f8ef744; color: var(--accent); }

  /* SETOR CHIPS */
  .chip { display: inline-block; background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; padding: 2px 8px; font-size: 11px; color: var(--text-dim); margin: 1px; }
</style>
</head>
<body>
<nav>
  <div class="nav-brand">Controle de Treinamentos <span>Ecolyzer</span></div>
  <a href="/" {% if request.endpoint=='index' %}class="active"{% endif %}>Dashboard</a>
  <a href="/treinamentos" {% if request.endpoint in ['treinamentos','novo_treinamento','editar_treinamento'] %}class="active"{% endif %}>Lista Doc</a>
  <a href="/colaboradores" {% if request.endpoint=='colaboradores' %}class="active"{% endif %}>Colaboradores</a>
  <div class="nav-sep"></div>
  <div class="nav-setores">
    {% for s in all_setores %}
    <a href="/setor/{{ s.sigla }}" {% if request.endpoint=='setor' and setor is defined and setor.sigla==s.sigla %}class="active"{% endif %}>{{ s.sigla }}</a>
    {% endfor %}
  </div>
</nav>
<main>
  {% block content %}{% endblock %}
</main>
<script>
// injetar setores no nav via context (passado pelo before_request)
</script>
</body>
</html>
