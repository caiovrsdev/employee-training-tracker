<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle de Treinamentos</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3248;
    --accent: #4f8ef7;
    --accent2: #6c63ff;
    --green: #22c55e;
    --red: #ef4444;
    --yellow: #f59e0b;
    --gray: #64748b;
    --text: #e2e8f0;
    --text-dim: #94a3b8;
    --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }

  /* NAV */
  nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; display: flex; align-items: center; gap: 8px; height: 56px; position: sticky; top: 0; z-index: 100; }
  .nav-brand { font-weight: 700; font-size: 15px; color: var(--accent); margin-right: 16px; white-space: nowrap; }
  .nav-brand span { color: var(--text-dim); font-weight: 400; }
  nav a { color: var(--text-dim); text-decoration: none; font-size: 13px; padding: 6px 12px; border-radius: 6px; transition: all .15s; white-space: nowrap; }
  nav a:hover, nav a.active { background: var(--surface2); color: var(--text); }
  .nav-sep { width: 1px; height: 20px; background: var(--border); margin: 0 4px; }
  .nav-setores { display: flex; gap: 4px; flex-wrap: nowrap; overflow-x: auto; }
  .nav-setores::-webkit-scrollbar { height: 0; }

  /* ESTILOS ADICIONADOS PARA A BARRA DE PESQUISA INTELIGENTE */
  .nav-search-container { position: relative; width: 280px; margin-left: auto; margin-right: 10px; }
  .nav-search-input { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 6px 12px; font-size: 13px; outline: none; transition: border .15s; }
  .nav-search-input:focus { border-color: var(--accent); }
  .nav-search-results { position: absolute; top: 120%; left: 0; width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; box-shadow: 0 8px 16px rgba(0,0,0,0.4); display: none; z-index: 9999; max-height: 220px; overflow-y: auto; }
  .search-item { padding: 8px 12px; cursor: pointer; border-bottom: 1px solid var(--border); font-size: 13px; color: var(--text); display: flex; justify-content: space-between; align-items: center; }
  .search-item:last-child { border-bottom: none; }
  .search-item:hover { background: var(--surface2); }
  .search-item strong { color: var(--accent); }
  .search-item span { font-size: 10px; background: var(--surface2); color: var(--text-dim); padding: 2px 6px; border-radius: 4px; border: 1px solid var(--border); }

  /* AUTH PANEL */
  .nav-auth { display: flex; align-items: center; gap: 10px; font-size: 12px; white-space: nowrap; }
  .nav-auth span { color: var(--text-dim); }
  .nav-auth a { padding: 4px 10px; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; font-weight: 600; }
  .nav-auth a.logout-btn { color: var(--red); border-color: rgba(239, 68, 68, 0.2); }
  .nav-auth a.logout-btn:hover { background: rgba(239, 68, 68, 0.1); }

  /* LAYOUT */
  main { max-width: 1400px; margin: 0 auto; padding: 28px 24px; }
  h1 { font-size: 22px; font-weight: 700; margin-bottom: 20px; }
  h2 { font-size: 16px; font-weight: 600; margin-bottom: 14px; color: var(--text-dim); }

  /* CARDS DASHBOARD */
  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px,1fr)); gap: 16px; margin-bottom: 32px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
  .card-num { font-size: 36px; font-weight: 800; line-height: 1; }
  .card-label { font-size: 12px; color: var(--text-dim); margin-top: 6px; text-transform: uppercase; letter-spacing: .05em; }
  .card.green .card-num { color: var(--green); }
  .card.red .card-num { color: var(--red); }
  .card.blue .card-num { color: var(--accent); }
  .card.gray .card-num { color: var(--gray); }

  /* TABLE */
  .table-wrap { overflow-x: auto; border-radius: var(--radius); border: 1px solid var(--border); }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th { background: var(--surface2); color: var(--text-dim); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: .06em; padding: 10px 14px; text-align: left; border-bottom: 1px solid var(--border); white-space: nowrap; }
  tbody tr { border-bottom: 1px solid var(--border); transition: background .1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--surface2); }
  td { padding: 10px 14px; vertical-align: middle; }
  td.center { text-align: center; }

  /* STATUS BADGES */
  .badge { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .badge-green { background: #14532d55; color: var(--green); border: 1px solid #22c55e44; }
  .badge-red   { background: #7f1d1d55; color: var(--red);   border: 1px solid #ef44
