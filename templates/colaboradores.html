{% extends "base.html" %}
{% block content %}
<div style="display: flex; gap: 40px; align-items: flex-start; flex-wrap: wrap;">
    <div class="card-box" style="flex: 1; min-width: 300px;">
        <h3>Novo Colaborador</h3>
        <form action="/colaboradores/novo" method="POST">
            <label>Nome Completo</label>
            <input type="text" name="nome" class="form-control" required>
            
            <label>Setor de Atuação</label>
            <select name="setor_id" class="form-control" required>
                {% for s in all_setores %}<option value="{{ s.id }}">{{ s.sigla }} - {{ s.nome }}</option>{% endfor %}
            </select>

            <label>Cargo / Nível</label>
            <select name="cargo" class="form-control" required>
                <option value="estagiário">Estagiário</option>
                <option value="aprendiz">Aprendiz</option>
                <option value="analista" selected>Analista</option>
                <option value="técnico">Técnico</option>
                <option value="coordenador">Coordenador</option>
            </select>
            
            <button type="submit" class="btn btn-primary" style="width: 100%;">Cadastrar Colaborador</button>
        </form>
    </div>

    <div class="card-box" style="flex: 2; min-width: 400px; overflow-x: auto;">
        <h3>Equipe Registrada</h3>
        <table>
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>Setor</th>
                    <th>Cargo</th>
                    <th style="text-align: right;">Ação</th>
                </tr>
            </thead>
            <tbody>
                {% for c in colaboradores %}
                <tr>
                    <td style="font-weight: 500;">{{ c.nome }}</td>
                    <td><span class="status-badge" style="background: var(--border); color: var(--text);">{{ c.setor.sigla }}</span></td>
                    <td style="text-transform: capitalize; color: var(--text-dim);">{{ c.cargo }}</td>
                    <td style="text-align: right;">
                        <a href="/colaborador/{{ c.id }}" class="btn" style="font-size: 12px;">Aba Individual</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
